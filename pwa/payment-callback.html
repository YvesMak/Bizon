<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bizon — Paiement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#C62828; --bg:#FDF5EB; --surface:#fff; --text:#1C1917; --muted:#78716C; --success:#16A34A; --border:#E5D5C0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
           min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { background:var(--surface); border:1.5px solid var(--border); border-radius:20px;
            max-width:420px; width:100%; padding:2.5rem 2rem; text-align:center;
            box-shadow:0 8px 32px rgba(28,25,23,.10); }
    .icon { width:72px; height:72px; border-radius:50%; margin:0 auto 1.25rem;
            display:flex; align-items:center; justify-content:center; font-size:2.25rem; }
    .icon.ok   { background:#DCFCE7; }
    .icon.fail { background:#FEE2E2; }
    .icon.wait { background:#FEF3C7; }
    h1 { font-size:1.375rem; font-weight:700; margin-bottom:.5rem; }
    p  { color:var(--muted); font-size:.95rem; line-height:1.5; margin-bottom:1.75rem; }
    .ref { font-family:monospace; font-size:.8rem; color:var(--muted); margin-bottom:1.5rem; word-break:break-all; }
    .btn { display:inline-block; background:var(--primary); color:#fff; text-decoration:none;
           padding:.875rem 2rem; border-radius:12px; font-weight:600; font-family:inherit; font-size:1rem;
           border:none; cursor:pointer; transition:background .2s; }
    .btn:hover { background:#B71C1C; }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--primary);
               border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 1.25rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Vérification du paiement…</h1>
    <p>Merci de patienter un instant.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const status = params.get('status');           // successful | cancelled | failed
    const txRef  = params.get('tx_ref');
    const card = document.getElementById('card');

    function render({ icon, title, message, showRef = true }) {
      card.innerHTML = `
        <div class="icon ${icon.cls}">${icon.emoji}</div>
        <h1>${title}</h1>
        <p>${message}</p>
        ${showRef && txRef ? `<div class="ref">Réf : ${txRef}</div>` : ''}
        <a class="btn" href="/index.html">Retour à l'accueil</a>`;
    }

    // Le règlement définitif est confirmé côté serveur via webhook.
    // Cette page reflète l'issue de la redirection pour l'utilisateur.
    if (status === 'successful' || status === 'completed') {
      render({
        icon: { cls:'ok', emoji:'✓' },
        title: 'Paiement réussi !',
        message: 'Votre commande est confirmée. Vous pouvez suivre son statut dans « Mes commandes ».'
      });
    } else if (status === 'cancelled') {
      render({
        icon: { cls:'wait', emoji:'!' },
        title: 'Paiement annulé',
        message: 'Vous avez interrompu le paiement. Votre commande n\'a pas été réglée.'
      });
    } else {
      render({
        icon: { cls:'fail', emoji:'✕' },
        title: 'Paiement non abouti',
        message: 'Le paiement n\'a pas pu être confirmé. Réessayez ou choisissez un autre moyen de paiement.'
      });
    }
  </script>
</body>
</html>
